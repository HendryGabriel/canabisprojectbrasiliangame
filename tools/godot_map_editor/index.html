<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Godot Map Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Godot Map Editor</h1>
        <span id="statusText">Pronto</span>
      </div>
      <div class="actions">
        <input id="assetFiles" type="file" accept=".png,.json,application/json,image/png" multiple hidden>
        <input id="projectFile" type="file" accept=".json,application/json" hidden>
        <button id="importAssetsBtn" type="button">Importar PNG + JSON</button>
        <button id="importProjectBtn" type="button">Abrir projeto</button>
        <button id="exportProjectBtn" type="button">Salvar projeto</button>
        <button id="exportMapBtn" class="primary" type="button">Exportar Godot JSON</button>
        <button id="exportImporterBtn" type="button">Exportar Importador</button>
      </div>
    </header>

    <aside class="panel left">
      <section class="block">
        <div class="block-title">Mapa</div>
        <div class="form-grid two">
          <label>Nome<input id="mapName" type="text" value="weed_factory_map"></label>
          <label>Tile<input id="tileSize" type="number" min="4" max="128" value="16"></label>
          <label>Largura<input id="mapWidth" type="number" min="1" max="512" value="40"></label>
          <label>Altura<input id="mapHeight" type="number" min="1" max="512" value="28"></label>
        </div>
        <button id="resizeMapBtn" type="button">Aplicar tamanho</button>
      </section>

      <section class="block">
        <div class="block-title">Ferramentas</div>
        <div class="tool-grid">
          <button class="tool active" data-tool="brush" type="button">Pincel</button>
          <button class="tool" data-tool="erase" type="button">Apagar</button>
          <button class="tool" data-tool="pick" type="button">Conta-gotas</button>
          <button class="tool" data-tool="fill" type="button">Preencher</button>
        </div>
        <div class="form-grid two">
          <label>Zoom<input id="zoomRange" type="range" min="1" max="6" value="3"></label>
          <label class="check"><input id="showGrid" type="checkbox" checked> Grid</label>
          <label class="check"><input id="showCollisions" type="checkbox" checked> Colisoes</label>
          <label class="check"><input id="snapDecor" type="checkbox" checked> Decor no chao</label>
        </div>
      </section>

      <section class="block layers-block">
        <div class="block-title row-title">
          <span>Camadas</span>
          <button id="addLayerBtn" type="button">+</button>
        </div>
        <div id="layersList" class="layers-list"></div>
      </section>
    </aside>

    <main class="workspace">
      <div class="canvas-toolbar">
        <span id="canvasInfo">40 x 28 celulas</span>
        <span id="selectionInfo">Nenhum sprite selecionado</span>
      </div>
      <div id="canvasWrap" class="canvas-wrap">
        <canvas id="mapCanvas" width="640" height="448"></canvas>
      </div>
    </main>

    <aside class="panel right">
      <section class="block">
        <div class="block-title">Sprites</div>
        <input id="assetSearch" type="search" placeholder="Buscar sprite, atlas ou tipo">
        <div class="asset-filters">
          <button class="filter active" data-kind="all" type="button">Todos</button>
          <button class="filter" data-kind="tile" type="button">Tiles</button>
          <button class="filter" data-kind="decor" type="button">Decor</button>
        </div>
        <label class="check asset-empty-filter"><input id="hideEmptyTiles" type="checkbox" checked> Ocultar tiles transparentes</label>
        <div id="assetList" class="asset-list"></div>
      </section>

      <section class="block inspector">
        <div class="block-title">Sprite selecionado</div>
        <div class="preview-row">
          <canvas id="previewCanvas" width="96" height="96"></canvas>
          <div>
            <strong id="assetName">Nenhum sprite</strong>
            <span id="assetMeta">Importe uma spritesheet para iniciar.</span>
          </div>
        </div>
        <div class="form-grid two">
          <label>Tipo
            <select id="assetKind">
              <option value="tile">Tilemap</option>
              <option value="decor">Decoracao</option>
            </select>
          </label>
          <label>Z local<input id="assetZ" type="number" min="-100" max="100" value="0"></label>
          <label>Pivot X<input id="pivotX" type="number" value="8"></label>
          <label>Pivot Y<input id="pivotY" type="number" value="16"></label>
        </div>
      </section>

      <section class="block">
        <div class="block-title">Colisao do sprite</div>
        <label class="check"><input id="collisionEnabled" type="checkbox"> Criar colisao</label>
        <div class="form-grid two">
          <label>X<input id="collisionX" type="number" value="0"></label>
          <label>Y<input id="collisionY" type="number" value="0"></label>
          <label>W<input id="collisionW" type="number" value="16"></label>
          <label>H<input id="collisionH" type="number" value="16"></label>
        </div>
        <div class="quick-row">
          <button id="collisionFullBtn" type="button">Cheia</button>
          <button id="collisionBottomBtn" type="button">Base</button>
          <button id="collisionClearBtn" type="button">Limpar</button>
        </div>
      </section>

      <section class="block atlas-block">
        <div class="block-title">Atlases importados</div>
        <div id="atlasList" class="atlas-list"></div>
      </section>
    </aside>
  </div>

  <template id="layerTemplate">
    <div class="layer-item">
      <button class="layer-select" type="button"></button>
      <input class="layer-name" type="text">
      <select class="layer-type">
        <option value="tile">Tilemap</option>
        <option value="decor">Decor</option>
      </select>
      <label class="mini-check"><input class="layer-visible" type="checkbox"> Visivel</label>
      <button class="layer-delete" type="button">Remover</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
