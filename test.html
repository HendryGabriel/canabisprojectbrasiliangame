<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Character Rig Alignment Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e24;
            color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
        }
        #canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #111115;
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            background: #222;
            border: 2px solid #444;
            image-rendering: pixelated;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #controls {
            width: 450px;
            margin-left: 20px;
            background: #2a2a35;
            padding: 20px;
            border-radius: 8px;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            color: #3b82f6;
        }
        .control-group {
            margin-bottom: 15px;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            background: #20202a;
        }
        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #a7f3d0;
            display: flex;
            justify-content: space-between;
        }
        .slider-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .slider-row label {
            width: 80px;
            font-size: 12px;
            color: #ccc;
        }
        .slider-row input[type="range"] {
            flex: 1;
            margin: 0 10px;
        }
        .slider-row span {
            width: 45px;
            font-size: 12px;
            text-align: right;
            font-family: monospace;
            color: #60a5fa;
        }
        pre {
            background: #111;
            padding: 15px;
            border-radius: 6px;
            font-size: 12px;
            overflow-x: auto;
            color: #34d399;
            border: 1px solid #333;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="stage" width="400" height="400"></canvas>
        <div style="margin-top:15px; color:#888; font-size:12px;">
            Target reference visual: Large head, centered face, arms down, legs close together.
        </div>
    </div>

    <div id="controls">
        <h2>Rig Controls</h2>
        
        <div class="control-group">
            <h3>Active View</h3>
            <div class="slider-row">
                <label>View</label>
                <select id="active-view" style="flex: 1; padding: 8px; background: #20202a; color: white; border: 1px solid #444; border-radius: 4px; font-weight: bold;">
                    <option value="Front">Front</option>
                    <option value="Back">Back</option>
                    <option value="L View">Left View</option>
                    <option value="R View">Right View</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <h3>Global</h3>
            <div class="slider-row">
                <label>Scale</label>
                <input type="range" id="global-scale" min="0.05" max="0.5" step="0.01" value="0.25">
                <span id="val-global-scale">0.25</span>
            </div>
            <div class="slider-row">
                <label>Body Y</label>
                <input type="range" id="body-y" min="-100" max="100" step="1" value="-3">
                <span id="val-body-y">-3</span>
            </div>
        </div>

        <div id="dynamic-controls"></div>

        <h3>Generated GDScript Config</h3>
        <pre id="output-code"></pre>
    </div>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');

        const views = ["Front", "Back", "L View", "R View"];
        const parts = ["body", "head", "face", "l_arm", "r_arm", "l_hand", "r_hand", "l_leg", "r_leg"];
        
        // Default configuration for all 4 views
        const config = {
            scale: 0.25,
            Front: {
                body: { y: -3, rot: 0, px: 80, py: 80, z: 2 },
                head: { x: 0, y: -35, rot: 0, px: 160, py: 240, z: 9 },
                face: { x: -1, y: -33, rot: 0, px: 80, py: 64, z: 10 },
                l_arm: { x: 45, y: -31, rot: 0, px: 40, py: 25, z: 3 },
                r_arm: { x: -47, y: -31, rot: 0, px: 40, py: 25, z: 3 },
                l_hand: { x: 9, y: 44, rot: 0, px: 40, py: 40, z: 2 },
                r_hand: { x: -5, y: 44, rot: 0, px: 40, py: 40, z: 2 },
                l_leg: { x: -17, y: 29, rot: 0, px: 40, py: 25, z: 0 },
                r_leg: { x: 17, y: 29, rot: 0, px: 40, py: 25, z: 1 }
            },
            Back: {
                body: { y: -3, rot: 0, px: 80, py: 80, z: 3 },
                head: { x: 0, y: -35, rot: 0, px: 160, py: 240, z: 9 },
                face: { x: 0, y: 0, rot: 0, px: 80, py: 64, z: 0 },
                l_arm: { x: 45, y: -31, rot: 0, px: 40, py: 25, z: 2 },
                r_arm: { x: -47, y: -31, rot: 0, px: 40, py: 25, z: 2 },
                l_hand: { x: 9, y: 44, rot: 0, px: 40, py: 40, z: 1 },
                r_hand: { x: -5, y: 44, rot: 0, px: 40, py: 40, z: 1 },
                l_leg: { x: -17, y: 29, rot: 0, px: 40, py: 25, z: 0 },
                r_leg: { x: 17, y: 29, rot: 0, px: 40, py: 25, z: 1 }
            },
            "L View": {
                body: { y: -3, rot: 0, px: 80, py: 80, z: 3 },
                head: { x: 2, y: -35, rot: 0, px: 160, py: 240, z: 9 },
                face: { x: -45, y: -33, rot: 0, px: 64, py: 64, z: 10 },
                l_arm: { x: -9, y: -31, rot: 0, px: 40, py: 25, z: 5 },
                r_arm: { x: 9, y: -31, rot: 0, px: 40, py: 25, z: 1 },
                l_hand: { x: -2, y: 44, rot: 0, px: 40, py: 40, z: 4 },
                r_hand: { x: 0, y: 44, rot: 0, px: 40, py: 40, z: 0 },
                l_leg: { x: -10, y: 29, rot: 0, px: 40, py: 25, z: 1 },
                r_leg: { x: 5, y: 29, rot: 0, px: 40, py: 25, z: 0 }
            },
            "R View": {
                body: { y: -3, rot: 0, px: 80, py: 80, z: 3 },
                head: { x: -2, y: -35, rot: 0, px: 160, py: 240, z: 9 },
                face: { x: 45, y: -33, rot: 0, px: 64, py: 64, z: 10 },
                l_arm: { x: -9, y: -31, rot: 0, px: 40, py: 25, z: 1 },
                r_arm: { x: 9, y: -31, rot: 0, px: 40, py: 25, z: 5 },
                l_hand: { x: 0, y: 44, rot: 0, px: 40, py: 40, z: 0 },
                r_hand: { x: 2, y: 44, rot: 0, px: 40, py: 40, z: 4 },
                l_leg: { x: -5, y: 29, rot: 0, px: 40, py: 25, z: 0 },
                r_leg: { x: 10, y: 29, rot: 0, px: 40, py: 25, z: 1 }
            }
        };

        let currentView = "Front";

        const imageNamesMap = {
            body: "Body",
            head: "Head",
            face: "Face 01",
            l_arm: "Left Arm",
            r_arm: "Right Arm",
            l_hand: "Left Hand",
            r_hand: "Right Hand",
            l_leg: "Left Leg",
            r_leg: "Right Leg"
        };

        const images = {};
        for (const v of views) {
            images[v] = {};
        }

        let loadedCount = 0;
        let totalToLoad = 0;

        // Determine image loading list
        const loadList = [];
        for (const v of views) {
            for (const p of parts) {
                if (p === "face" && v === "Back") continue; // No face for back view
                totalToLoad++;
                loadList.push({ view: v, part: p });
            }
        }

        // UI Sliders limits
        const controlsMeta = {
            body: { z: [0, 10, 1] },
            head: { x: [-150, 150], y: [-150, 150], rot: [-3.14, 3.14, 0.05], px: [0, 320], py: [0, 320], z: [0, 10, 1] },
            face: { x: [-150, 150], y: [-150, 150], rot: [-3.14, 3.14, 0.05], px: [0, 160], py: [0, 128], z: [0, 10, 1] },
            l_arm: { x: [-100, 100], y: [-100, 100], rot: [-3.14, 3.14, 0.05], px: [0, 80], py: [0, 80], z: [0, 10, 1] },
            r_arm: { x: [-100, 100], y: [-100, 100], rot: [-3.14, 3.14, 0.05], px: [0, 80], py: [0, 80], z: [0, 10, 1] },
            l_hand: { x: [-100, 100], y: [-100, 100], rot: [-3.14, 3.14, 0.05], px: [0, 80], py: [0, 80], z: [0, 10, 1] },
            r_hand: { x: [-100, 100], y: [-100, 100], rot: [-3.14, 3.14, 0.05], px: [0, 80], py: [0, 80], z: [0, 10, 1] },
            l_leg: { x: [-100, 100], y: [-100, 100], rot: [-3.14, 3.14, 0.05], px: [0, 80], py: [0, 80], z: [0, 10, 1] },
            r_leg: { x: [-100, 100], y: [-100, 100], rot: [-3.14, 3.14, 0.05], px: [0, 80], py: [0, 80], z: [0, 10, 1] }
        };

        // Create UI Controls
        const container = document.getElementById('dynamic-controls');
        for (const [part, params] of Object.entries(controlsMeta)) {
            const group = document.createElement('div');
            group.className = 'control-group';
            group.innerHTML = `<h3>${part.toUpperCase()}</h3>`;
            
            for (const [param, range] of Object.entries(params)) {
                const row = document.createElement('div');
                row.className = 'slider-row';
                const labelName = param === 'px' ? 'Pivot X' : (param === 'py' ? 'Pivot Y' : param.toUpperCase());
                const val = config[currentView][part][param];
                const min = range[0];
                const max = range[1];
                const step = range[2] || 1;
                
                row.innerHTML = `
                    <label>${labelName}</label>
                    <input type="range" id="${part}-${param}" min="${min}" max="${max}" step="${step}" value="${val}">
                    <span id="val-${part}-${param}">${val}</span>
                `;
                group.appendChild(row);
            }
            container.appendChild(group);
        }

        // Add Listeners to sliders
        function bindListeners() {
            document.querySelectorAll('input[type="range"]').forEach(input => {
                input.oninput = (e) => {
                    const id = e.target.id;
                    const val = parseFloat(e.target.value);
                    document.getElementById('val-' + id).innerText = val;
                    
                    if (id === 'global-scale') {
                        config.scale = val;
                    } else if (id === 'body-y') {
                        config[currentView].body.y = val;
                    } else {
                        const [part, param] = id.split('-');
                        config[currentView][part][param] = val;
                    }
                    render();
                };
            });
        }
        
        bindListeners();

        // View Selector listener
        document.getElementById('active-view').onchange = (e) => {
            currentView = e.target.value;
            updateSliders();
            render();
        };

        function updateSliders() {
            for (const [part, params] of Object.entries(controlsMeta)) {
                for (const param of Object.keys(params)) {
                    const input = document.getElementById(`${part}-${param}`);
                    if (input) {
                        const val = config[currentView][part][param];
                        input.value = val;
                        document.getElementById(`val-${part}-${param}`).innerText = val;
                    }
                }
            }
            document.getElementById('body-y').value = config[currentView].body.y;
            document.getElementById('val-body-y').innerText = config[currentView].body.y;
        }

        // Load images
        for (const item of loadList) {
            const prefix = imageNamesMap[item.part];
            const path = `Vector Parts/${prefix} - ${item.view}.png`;
            
            images[item.view][item.part] = new Image();
            images[item.view][item.part].onload = () => {
                loadedCount++;
                if (loadedCount === totalToLoad) {
                    render();
                }
            };
            images[item.view][item.part].onerror = () => {
                console.error("Failed to load image: " + path);
                loadedCount++;
                if (loadedCount === totalToLoad) {
                    render();
                }
            };
            images[item.view][item.part].src = path;
        }

        function getPartInfo(pos, rot, parentPos = {x:0, y:0}, parentRot = 0) {
            const scale = config.scale;
            const globalRot = parentRot + rot;
            
            const rx = pos.x * scale;
            const ry = pos.y * scale;
            
            const cos = Math.cos(parentRot);
            const sin = Math.sin(parentRot);
            const ox = rx * cos - ry * sin;
            const oy = rx * sin + ry * cos;
            
            return {
                pos: {
                    x: parentPos.x + ox,
                    y: parentPos.y + oy
                },
                rot: globalRot
            };
        }

        function drawPartDirect(ctx, img, globalPos, globalRot, pivot) {
            const scale = config.scale;
            ctx.save();
            ctx.translate(globalPos.x, globalPos.y);
            ctx.rotate(globalRot);
            ctx.scale(scale, scale);
            ctx.drawImage(img, -pivot.x, -pivot.y);
            ctx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(200, 208, 30, 10, 0, 0, 2 * Math.PI);
            ctx.fill();

            const viewCfg = config[currentView];
            const bodyPos = { x: 200, y: 200 + viewCfg.body.y };
            const bodyRot = viewCfg.body.rot;

            // Calculate global positions
            const parts = {};
            const viewImages = images[currentView];
            
            // 1. Body
            parts.body = { pos: bodyPos, rot: bodyRot, img: viewImages.body, pivot: { x: viewCfg.body.px, y: viewCfg.body.py }, z: viewCfg.body.z };
            
            // 2. Legs
            parts.l_leg = Object.assign(getPartInfo(viewCfg.l_leg, viewCfg.l_leg.rot, bodyPos, bodyRot), 
                { img: viewImages.l_leg, pivot: { x: viewCfg.l_leg.px, y: viewCfg.l_leg.py }, z: viewCfg.l_leg.z });
            parts.r_leg = Object.assign(getPartInfo(viewCfg.r_leg, viewCfg.r_leg.rot, bodyPos, bodyRot), 
                { img: viewImages.r_leg, pivot: { x: viewCfg.r_leg.px, y: viewCfg.r_leg.py }, z: viewCfg.r_leg.z });
            
            // 3. Head
            parts.head = Object.assign(getPartInfo(viewCfg.head, viewCfg.head.rot, bodyPos, bodyRot), 
                { img: viewImages.head, pivot: { x: viewCfg.head.px, y: viewCfg.head.py }, z: viewCfg.head.z });
            
            // 4. Face (ignore if Back view)
            if(viewImages.face) {
                parts.face = Object.assign(getPartInfo(viewCfg.face, viewCfg.face.rot, parts.head.pos, parts.head.rot), 
                    { img: viewImages.face, pivot: { x: viewCfg.face.px, y: viewCfg.face.py }, z: viewCfg.face.z });
            }
            
            // 5. Left Arm
            parts.l_arm = Object.assign(getPartInfo(viewCfg.l_arm, viewCfg.l_arm.rot, bodyPos, bodyRot), 
                { img: viewImages.l_arm, pivot: { x: viewCfg.l_arm.px, y: viewCfg.l_arm.py }, z: viewCfg.l_arm.z });
            
            // 6. Left Hand
            parts.l_hand = Object.assign(getPartInfo(viewCfg.l_hand, viewCfg.l_hand.rot, parts.l_arm.pos, parts.l_arm.rot), 
                { img: viewImages.l_hand, pivot: { x: viewCfg.l_hand.px, y: viewCfg.l_hand.py }, z: viewCfg.l_hand.z });
            
            // 7. Right Arm
            parts.r_arm = Object.assign(getPartInfo(viewCfg.r_arm, viewCfg.r_arm.rot, bodyPos, bodyRot), 
                { img: viewImages.r_arm, pivot: { x: viewCfg.r_arm.px, y: viewCfg.r_arm.py }, z: viewCfg.r_arm.z });
            
            // 8. Right Hand
            parts.r_hand = Object.assign(getPartInfo(viewCfg.r_hand, viewCfg.r_hand.rot, parts.r_arm.pos, parts.r_arm.rot), 
                { img: viewImages.r_hand, pivot: { x: viewCfg.r_hand.px, y: viewCfg.r_hand.py }, z: viewCfg.r_hand.z });

            // Collect parts into array and sort by Z-index (ascending)
            const drawList = Object.values(parts).sort((a, b) => a.z - b.z);

            // Draw all parts in Z-sorted order
            for (const p of drawList) {
                if (p.img) {
                    drawPartDirect(ctx, p.img, p.pos, p.rot, p.pivot);
                }
            }

            updateOutput();
        }

        function updateOutput() {
            const code = `// Copy this config to your GDScript joint_offsets
var joint_offsets := {
	"Front": {
		"neck": Vector2(${config.Front.head.x}, ${config.Front.head.y}),
		"face": Vector2(${config.Front.face.x}, ${config.Front.face.y}),
		"l_shoulder": Vector2(${config.Front.l_arm.x}, ${config.Front.l_arm.y}),
		"r_shoulder": Vector2(${config.Front.r_arm.x}, ${config.Front.r_arm.y}),
		"l_hip": Vector2(${config.Front.l_leg.x}, ${config.Front.l_leg.y}),
		"r_hip": Vector2(${config.Front.r_leg.x}, ${config.Front.r_leg.y}),
		"l_wrist": Vector2(${config.Front.l_hand.x}, ${config.Front.l_hand.y}),
		"r_wrist": Vector2(${config.Front.r_hand.x}, ${config.Front.r_hand.y})
	},
	"Back": {
		"neck": Vector2(${config.Back.head.x}, ${config.Back.head.y}),
		"face": Vector2.ZERO,
		"l_shoulder": Vector2(${config.Back.l_arm.x}, ${config.Back.l_arm.y}),
		"r_shoulder": Vector2(${config.Back.r_arm.x}, ${config.Back.r_arm.y}),
		"l_hip": Vector2(${config.Back.l_leg.x}, ${config.Back.l_leg.y}),
		"r_hip": Vector2(${config.Back.r_leg.x}, ${config.Back.r_leg.y}),
		"l_wrist": Vector2(${config.Back.l_hand.x}, ${config.Back.l_hand.y}),
		"r_wrist": Vector2(${config.Back.r_hand.x}, ${config.Back.r_hand.y})
	},
	"L View": {
		"neck": Vector2(${config["L View"].head.x}, ${config["L View"].head.y}),
		"face": Vector2(${config["L View"].face.x}, ${config["L View"].face.y}),
		"l_shoulder": Vector2(${config["L View"].l_arm.x}, ${config["L View"].l_arm.y}),
		"r_shoulder": Vector2(${config["L View"].r_arm.x}, ${config["L View"].r_arm.y}),
		"l_hip": Vector2(${config["L View"].l_leg.x}, ${config["L View"].l_leg.y}),
		"r_hip": Vector2(${config["L View"].r_leg.x}, ${config["L View"].r_leg.y}),
		"l_wrist": Vector2(${config["L View"].l_hand.x}, ${config["L View"].l_hand.y}),
		"r_wrist": Vector2(${config["R View"].r_hand.x}, ${config["R View"].r_hand.y})
	},
	"R View": {
		"neck": Vector2(${config["R View"].head.x}, ${config["R View"].head.y}),
		"face": Vector2(${config["R View"].face.x}, ${config["R View"].face.y}),
		"l_shoulder": Vector2(${config["R View"].l_arm.x}, ${config["R View"].l_arm.y}),
		"r_shoulder": Vector2(${config["R View"].r_arm.x}, ${config["R View"].r_arm.y}),
		"l_hip": Vector2(${config["R View"].l_leg.x}, ${config["R View"].l_leg.y}),
		"r_hip": Vector2(${config["R View"].r_leg.x}, ${config["R View"].r_leg.y}),
		"l_wrist": Vector2(${config["R View"].l_hand.x}, ${config["R View"].l_hand.y}),
		"r_wrist": Vector2(${config["R View"].r_hand.x}, ${config["R View"].r_hand.y})
	}
}

// Z-Indexes (Active: ${currentView}):
// Left Leg: ${config[currentView].l_leg.z}
// Right Leg: ${config[currentView].r_leg.z}
// Left Arm: ${config[currentView].l_arm.z}
// Left Hand: ${config[currentView].l_hand.z}
// Head: ${config[currentView].head.z}
// Face: ${config[currentView].face.z}
// Body: ${config[currentView].body.z}
// Right Arm: ${config[currentView].r_arm.z}
// Right Hand: ${config[currentView].r_hand.z}`;

            document.getElementById('output-code').innerText = code;
        }
    </script>
</body>
</html>
